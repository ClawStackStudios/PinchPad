version: '3.9'
services:
  app:
    build: .
    ports:
      - "8383:8383"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - CORS_ORIGIN=http://localhost:8282
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8383/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
